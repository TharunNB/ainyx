version: "2"

sql:
  - engine: "postgresql"
    queries: "../query/query.sql"
    schema: "../migrations/001_init_schema.sql"
    gen:
      go:
        package: "db"
        out: ./
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true